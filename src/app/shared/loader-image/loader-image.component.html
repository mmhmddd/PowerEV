<div class="loader-overlay" *ngIf="isLoading">
  <div class="loader-content">
    <!-- Logo with animated reveal -->
    <div class="logo-container">
      <!-- Background glow -->
      <div class="glow-effect"></div>

      <!-- Logo image with clip-path animation -->
      <div class="logo-wrapper">
        <img src="/assets/images/logo/logo-removebg.png" alt="Power EV" class="logo-grayscale">
        <img src="/assets/images/logo/logo.webp" alt="Power EV" class="logo-color">
        <div class="fill-overlay"></div>
      </div>

      <!-- Energy ring -->
      <div class="energy-ring"></div>
      <div class="energy-ring-2"></div>

      <!-- Particle effects -->
      <div class="particle p1"></div>
      <div class="particle p2"></div>
      <div class="particle p3"></div>
      <div class="particle p4"></div>
      <div class="particle p5"></div>
      <div class="particle p6"></div>
    </div>

    <!-- Progress bar -->
    <div class="progress-container">
      <div class="progress-bar">
        <div class="progress-fill"></div>
        <div class="progress-glow"></div>
      </div>
      <div class="progress-text">
        <span class="percentage">0%</span>
      </div>
    </div>

    <!-- Loading text -->
    <div class="loading-text">
      <span class="letter">P</span>
      <span class="letter">O</span>
      <span class="letter">W</span>
      <span class="letter">E</span>
      <span class="letter">R</span>
      <span class="letter space"></span>
      <span class="letter">E</span>
      <span class="letter">V</span>
      <span class="dots">
        <span>.</span>
        <span>.</span>
        <span>.</span>
      </span>
    </div>
  </div>
</div>
